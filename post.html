<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 보기 | Lotto hub</title>
    <meta name="description" content="Lotto hub 커뮤니티 게시글입니다.">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .post-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .post-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .post-title {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }
        .post-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .post-body {
            font-size: 1rem;
            color: var(--text-main);
            line-height: 1.6;
            white-space: pre-wrap;
            min-height: 200px;
        }
        .post-image {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #e2e8f0;
            color: #475569;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #cbd5e1;
        }
        .dark-mode .back-btn {
            background: #334155;
            color: #e2e8f0;
        }
        .dark-mode .back-btn {
            background: #334155;
            color: #e2e8f0;
        }
        .dark-mode .back-btn:hover {
            background: #475569;
        }
        .delete-btn {
            display: inline-block;
            margin-top: 30px;
            margin-left: 10px;
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="icon.png" alt="Lotto hub" style="width: 36px; height: 36px; border-radius: 6px;">
                <a href="index.html" style="text-decoration:none; color:inherit;">Lotto hub</a>
            </h1>
            <nav class="nav">
                <a href="about.html" class="nav-btn">소개</a>
                <a href="articles.html" class="nav-btn">로또 칼럼</a>
                <a href="analysis.html" class="nav-btn">당첨번호 분석</a>
                <a href="community.html" class="nav-btn">커뮤니티</a>
                <div id="authNavContainer" style="display: flex; align-items: center; border-left: 1px solid var(--border-color); padding-left: 20px; margin-left: 10px;"></div>
            </nav>
        </div>
    </header>

    <main>
        <div class="adsense-container top">
            <div class="adsense-placeholder">구글 애드센스 반응형 광고 (상단)</div>
        </div>

        <section class="page-content">
            <div class="container">
                <div class="post-container" id="postContainer">
                    <div style="text-align:center; padding: 50px;">
                        <p>게시글을 불러오는 중입니다...</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="adsense-container bottom">
            <div class="adsense-placeholder">구글 애드센스 반응형 광고 (하단)</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="terms.html">이용약관</a>
                <span class="divider">|</span>
                <a href="privacy.html">개인정보처리방침</a>
            </div>
            <p>&copy; 2026 Lotto hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="auth.js?v=18"></script>
    <script type="module" src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            const container = document.getElementById('postContainer');

            if (!postId) {
                container.innerHTML = `<div style="text-align:center; padding:50px;"><h3>잘못된 접근입니다.</h3><a href="community.html" class="back-btn">목록으로 돌아가기</a></div>`;
                return;
            }

            // Load posts from localStorage
            let posts = [];
            try {
                posts = JSON.parse(localStorage.getItem('lotto_hub_posts')) || [];
            } catch(e) {}

            const post = posts.find(p => p.id.toString() === postId);

            if (!post) {
                // If it's an auto-generated post, it might not be in localStorage.
                if (postId.startsWith('auto-')) {
                    container.innerHTML = `<div style="text-align:center; padding:50px;"><h3>자동 분석 게시글은 커뮤니티 메인에서 바로 확인 가능합니다.</h3><a href="community.html" class="back-btn">목록으로 돌아가기</a></div>`;
                } else {
                    container.innerHTML = `<div style="text-align:center; padding:50px;"><h3>존재하지 않거나 삭제된 게시글입니다.</h3><a href="community.html" class="back-btn">목록으로 돌아가기</a></div>`;
                }
                return;
            }

            // Render post
            let contentHtml = post.content.replace(/\n/g, '<br>');
            let imageHtml = '';
            if (post.image) {
                imageHtml = `<img src="${post.image}" class="post-image" alt="첨부 이미지">`;
            }

            container.innerHTML = `
                <div class="post-header">
                    <h2 class="post-title">${post.title}</h2>
                    <div class="post-meta">
                        작성자: <strong>${post.author}</strong> &nbsp;|&nbsp; 작성일: ${post.date}
                    </div>
                </div>
                <div class="post-body">
                    ${contentHtml}
                    ${imageHtml ? `<div style="margin-top:20px; text-align:center;">${imageHtml}</div>` : ''}
                </div>
                <div style="text-align: center; margin-top: 40px;">
                    <a href="community.html" class="back-btn">목록으로 돌아가기</a>
                    <button id="deletePostBtn" class="delete-btn">게시글 삭제</button>
                </div>
            `;
            
            // Set document title
            document.title = `${post.title} | Lotto hub 커뮤니티`;

            // Delete logic
            const deleteBtn = document.getElementById('deletePostBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    if (confirm('정말로 이 게시글을 삭제하시겠습니까? 삭제된 글은 복구할 수 없습니다.')) {
                        // Remove from localStorage
                        let updatedPosts = posts.filter(p => p.id.toString() !== postId);
                        localStorage.setItem('lotto_hub_posts', JSON.stringify(updatedPosts));
                        alert('게시글이 성공적으로 삭제되었습니다.');
                        window.location.href = 'community.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
