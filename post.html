    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            }

            // Load posts from localStorage
            let posts = [];
            try {
                posts = JSON.parse(localStorage.getItem('lotto_hub_posts')) || [];
            } catch(e) {}

            const post = posts.find(p => p.id.toString() === postId);

            if (!post) {
                // If it's an auto-generated post, it might not be in localStorage.

            }

            // Render post

                imageHtml = `<img src="${post.image}" class="post-image" alt="泥⑤? ?대?吏">`;
            }

            container.innerHTML = `
                <div class="post-header">
                    <h2 class="post-title">${post.title}</h2>

                        ?묒꽦?? <strong>${post.author}</strong> &nbsp;|&nbsp; ?묒꽦?? ${post.date}

                    <button id="deletePostBtn" class="delete-btn">寃뚯떆湲 ??젣</button>

            `;

            // Delete logic

            if (deleteBtn) {
