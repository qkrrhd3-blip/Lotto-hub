name: SEO Automation (Weekly Lotto Posts Generator)

on:
  schedule:
    # 매주 토요일 오후 10시(KST 기준)에 자동 실행 (UTC 시간으로는 오후 1시)
    - cron: '0 13 * * 6'
  workflow_dispatch: # 수동으로도 버튼을 눌러 실행할 수 있도록 허용

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 레포지토리에 푸시할 권한 설정
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run SEO Builder Script
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        python build_seo.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 새롭게 생성되거나 수정된 HTML, sitemap.xml 등을 모두 스테이징
        git add post-*.html sitemap.xml
        
        # 변경사항이 있을 경우에만 커밋 및 푸시
        git diff --staged --quiet || (git commit -m "chore: Auto-generate SEO posts and sitemap [skip ci]" && git push)
