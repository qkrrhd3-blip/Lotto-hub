<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | Lotto hub</title>
    <meta name="description" content="내가 저장한 로또 추천 번호와 실시간 당첨 결과를 확인하세요.">
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="style.css?v=21">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .mypage-header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .saved-game-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            position: relative;
        }
        .saved-game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .draw-badge {
            background: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .win-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }
        .win-1 { background: #ffd700; color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .win-2 { background: #c0c0c0; color: #000; }
        .win-3 { background: #cd7f32; color: #fff; }
        .win-4 { background: #4caf50; color: #fff; }
        .win-5 { background: #2196f3; color: #fff; }
        .win-none { background: var(--border-color); color: var(--text-muted); }
        .win-wait { background: #9c27b0; color: #fff; }
        
        .delete-account-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }
        .delete-account-btn:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="icon.png" alt="Lotto hub" style="width: 36px; height: 36px; border-radius: 6px;">
                <a href="index.html" style="text-decoration:none; color:inherit;">Lotto hub</a>
            </h1>
            <nav class="nav">
                <a href="about.html" class="nav-btn">소개</a>
                <a href="articles.html" class="nav-btn">로또 칼럼</a>
                <a href="community.html" class="nav-btn">커뮤니티</a>
                <div id="authNavContainer" style="display: flex; align-items: center; border-left: 1px solid var(--border-color); padding-left: 20px; margin-left: 10px;"></div>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px; min-height: 70vh;">
        <div class="mypage-header">
            <h2 style="margin-top:0; color: var(--primary-color);">마이페이지</h2>
            <p id="userEmailDisplay" style="font-size: 1.1rem; color: var(--text-main); font-weight: bold;">로딩 중...</p>
            <p style="color: var(--text-muted); font-size: 0.95rem;">저장하신 로또 번호와 실시간 당첨 결과를 자동으로 대조해 드립니다.</p>
            <button id="deleteAccountBtn" class="delete-account-btn">회원 탈퇴 및 정보 파기</button>
        </div>

        <h3 style="border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 20px;">내 번호 보관함 <span id="savedCount" style="color: var(--text-muted); font-size: 0.9rem; font-weight: normal;">(0건)</span></h3>
        
        <div id="loadingIndicator" style="text-align: center; padding: 40px; color: var(--text-muted);">
            데이터를 불러오고 당첨 번호를 대조하는 중입니다...
        </div>
        
        <div id="savedGamesContainer">
            <!-- 저장된 게임들이 여기에 렌더링됩니다 -->
        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="terms.html">이용약관</a>
                <span class="divider">|</span>
                <a href="privacy.html">개인정보처리방침</a>
            </div>
            <p>&copy; 2026 Lotto hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script type="module" src="db.js?v=2"></script>
    <script type="module" src="mypage.js?v=1"></script>
</body>
</html>
